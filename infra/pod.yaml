# Podman pod: postgres + app sharing one network namespace. TLS terminates on
# archbox (Caddy, Cloudflare DNS-01); it reverse-proxies to this VM's :3000.
#
#   podman play kube infra/pod.yaml
#
# Replace the change-me values with real secrets before first start. The app
# image auto-updates from GHCR via podman-auto-update (see the annotation);
# migrations run automatically at container start. Postgres is NOT published —
# DataGrip reaches it via an SSH tunnel to this VM (see docs/deployment.md).
apiVersion: v1
kind: Pod
metadata:
  name: statgoblin
  annotations:
    io.containers.autoupdate/app: registry
spec:
  containers:
    - name: postgres
      image: docker.io/library/postgres:16
      env:
        - { name: POSTGRES_USER, value: statgoblin }
        - { name: POSTGRES_PASSWORD, value: change-me }
        - { name: POSTGRES_DB, value: statgoblin }
      volumeMounts:
        - { name: pgdata, mountPath: /var/lib/postgresql/data }

    - name: app
      image: ghcr.io/davidmcalle/statgoblin:latest
      ports:
        - { containerPort: 3000, hostPort: 3000 }
      env:
        - name: DATABASE_URL
          value: postgresql://statgoblin:change-me@localhost:5432/statgoblin?schema=public
        - name: CLERK_SECRET_KEY
          value: change-me
        - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
          value: change-me
        # Optional: enables the Claude-written narrative in Discord session
        # summaries. Leave as change-me to send plain stat summaries instead.
        - name: ANTHROPIC_API_KEY
          value: change-me
        # Required for storing Discord webhooks (encrypted at rest).
        # Generate once with: openssl rand -hex 32 — and never rotate casually:
        # a new key orphans stored webhooks (GMs must re-paste them).
        - name: ENCRYPTION_KEY
          value: change-me
        # Optional: voice recaps (ElevenLabs text-to-dialogue).
        - name: ELEVENLABS_API_KEY
          value: change-me
        - name: ELEVENLABS_VOICE_ZOG
          value: change-me
        - name: ELEVENLABS_VOICE_ZAELA
          value: change-me

  volumes:
    - name: pgdata
      persistentVolumeClaim: { claimName: statgoblin-pgdata }
